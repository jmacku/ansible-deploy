server {
    listen 9000 ssl http2;
    listen [::]:9000 ssl http2;

    server_name ocpp.dlab.cz;


    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    ssl_certificate /etc/letsencrypt/live/ha.dlab.cz/fullchain.pem; # copy from public proxy
    ssl_certificate_key /etc/letsencrypt/live/ha.dlab.cz/privkey.pem; # copy from public proxy
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 1M;
    proxy_buffering off;

    ## ocpp

      # Proxy ocpp WebSocket connections.
      location / {
        proxy_set_header        Host ocpp.dlab.cz;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        proxy_set_header        Upgrade $http_upgrade;
        proxy_set_header        Connection $connection_upgrade;

        proxy_pass              http://localhost:9001;
        proxy_http_version      1.1;
      }
}
