map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream assistant {
    server localhost:8123;
}

upstream grafana {
    server localhost:3000;
}

upstream zigbee2mqtt {
    server localhost:8081;
}

upstream nodered {
    server localhost:1880;
}

upstream prometheus {
    server localhost:9090;
}

upstream pihole {
    server localhost:8089;
}

upstream uptime {
    server localhost:3001;
}

server {
    listen 80 http2;
    listen [::]:80 http2;
    server_name ha.dlab.cz;

    location /.well-known/acme-challenge/  {
            alias /usr/share/nginx/html/.well-known/acme-challenge/;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ha.dlab.cz;

    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    ssl_certificate /etc/letsencrypt/live/ha.dlab.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ha.dlab.cz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 4M;
    proxy_buffering off;

    # Proxy Grafana Live WebSocket connections
    location /grafana/api/live/ {
        proxy_set_header        Host ha.dlab.cz;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Upgrade $http_upgrade;
        proxy_set_header        Connection $connection_upgrade;

        proxy_pass              http://grafana;
        proxy_http_version      1.1;
      }

    location /grafana/ {
        proxy_set_header        Host $host;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_pass              http://grafana;
      }

    # zigbee2mqtt
    location /zigbee2mqtt/api {
        rewrite                 /zigbee2mqtt/(.*) /$1  break;
        proxy_pass              http://zigbee2mqtt/api;
        proxy_set_header Host   ha.dlab.cz;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade $http_upgrade;
        proxy_set_header        Connection "upgrade";
    }

    location /zigbee2mqtt/ {
        rewrite                 /zigbee2mqtt/(.*) /$1  break;
        proxy_pass              http://zigbee2mqtt;
        proxy_set_header        Host $http_host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version      1.1;
    }

    location /pihole/ {
        rewrite                 /pihole/(.*) /$1  break;
        proxy_pass              http://pihole;
        proxy_set_header        Host $http_host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version      1.1;
    }

    location /uptime/ {
        proxy_pass              http://uptime/;
        proxy_set_header        Host $http_host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        Upgrade $http_upgrade;
        proxy_set_header        Connection "upgrade";
      	proxy_redirect		      ^(/.*) $1;
    }

    ## node-red
    location /nodered {
      	proxy_pass              http://nodered;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade $http_upgrade;
        proxy_set_header        Connection "upgrade";
    }

    ## prometheus
    location /prometheus {
      	proxy_pass              http://prometheus;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade $http_upgrade;
        proxy_set_header        Connection "upgrade";
    }

    ## home assistant
    location / {
        proxy_set_header        Host ha.dlab.cz;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Upgrade $http_upgrade;
        proxy_set_header        Connection "upgrade";
        proxy_pass              http://assistant;
        proxy_http_version      1.1;
        proxy_read_timeout      90;
    }
}
