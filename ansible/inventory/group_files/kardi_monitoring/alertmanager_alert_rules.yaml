groups:
  - name: disk_alerts
    rules:
      - alert: DiskSpaceWarning
        expr: >
          (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs|squashfs|overlay",mountpoint!~"/boot/efi"}
               / node_filesystem_size_bytes{fstype!~"tmpfs|devtmpfs|squashfs|overlay",mountpoint!~"/boot/efi"}) * 100 > 80
        for: 5m
        labels:
          severity: warning
          environment: "{{ $labels.environment }}"
        annotations:
          summary: "Disk usage above 80% on {{ $labels.instance }}"
          description: "Partition {{ $labels.mountpoint }} on {{ $labels.instance }} is {{ $value | printf \"%.1f\" }}% full."

      - alert: DiskSpaceCritical
        expr: >
          (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs|squashfs|overlay",mountpoint!~"/boot/efi"}
               / node_filesystem_size_bytes{fstype!~"tmpfs|devtmpfs|squashfs|overlay",mountpoint!~"/boot/efi"}) * 100 > 90
        for: 5m
        labels:
          severity: critical
          environment: "{{ $labels.environment }}"
        annotations:
          summary: "Disk usage above 90% on {{ $labels.instance }}"
          description: "Partition {{ $labels.mountpoint }} on {{ $labels.instance }} is {{ $value | printf \"%.1f\" }}% full. Immediate action required."

      - alert: DiskFillingUpFast
        expr: >
          predict_linear(node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs|squashfs|overlay",mountpoint!~"/boot/efi"}[6h], 24 * 3600) < 0
          and node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs|squashfs|overlay",mountpoint!~"/boot/efi"}
              / node_filesystem_size_bytes{fstype!~"tmpfs|devtmpfs|squashfs|overlay",mountpoint!~"/boot/efi"} < 0.5
        for: 30m
        labels:
          severity: info
          environment: "{{ $labels.environment }}"
        annotations:
          summary: "Disk filling up fast on {{ $labels.instance }}"
          description: "Partition {{ $labels.mountpoint }} on {{ $labels.instance }} is predicted to fill up within 24 hours based on the last 6 hours trend."

  - name: node_alerts
    rules:
      - alert: NodeExporterDown
        expr: up{job="node_exporter"} == 0
        for: 2m
        labels:
          severity: critical
          environment: "{{ $labels.environment }}"
        annotations:
          summary: "Node exporter unreachable on {{ $labels.target }}"
          description: "Node exporter on {{ $labels.target }} has been unreachable for more than 2 minutes. Disk, CPU and memory metrics are unavailable."

  - name: blackbox_alerts
    rules:
      - alert: EndpointDown
        expr: probe_success == 0
        for: 5m
        labels:
          severity: critical
          environment: "{{ $labels.environment }}"
        annotations:
          summary: "{{ $labels.instance }} is unreachable"
          #description: "Blackbox exporter nemůže načíst {{ $labels.instance }}. Buď neodpovídá, nebo vrací chybu."

      - alert: EndpointSlow
        expr: probe_duration_seconds > 5 and probe_success == 1
        for: 10m
        labels:
          severity: warning
          environment: "{{ $labels.environment }}"
        annotations:
          summary: "Response of {{ $labels.instance }} is slow"
          description: "HTTP response of {{ $labels.target }} is taking longer than 5 seconds. Check resources usage or network conditions closer."

      - alert: SslCertExpiringSoon
        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 14
        for: 1h
        labels:
          severity: warning
          environment: "{{ $labels.environment }}"
        annotations:
          summary: "SSL certificate will expire soon"
          description: "Validity of SSL certificate for {{ $labels.instance }} will expire in 14 days. Please check renewal process."

