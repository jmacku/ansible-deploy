---
- name: Install certbot and Route53 DNS plugin
  ansible.builtin.apt:
    name:
      - certbot
      - python3-certbot-dns-route53
    state: present
    update_cache: yes

- name: Create AWS credentials directory
  ansible.builtin.file:
    path: /root/.aws
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Write AWS credentials for certbot
  ansible.builtin.copy:
    dest: /root/.aws/credentials
    content: |
      [default]
      aws_access_key_id = {{ aws_access_key_id }}
      aws_secret_access_key = {{ aws_secret_access_key }}
    owner: root
    group: root
    mode: '0600'

# awscrt (used by python3-certbot-dns-route53 on Ubuntu 22+) requires region even for Route53
- name: Write AWS config with default region
  ansible.builtin.copy:
    dest: /root/.aws/config
    content: |
      [default]
      region = {{ aws_region }}
    owner: root
    group: root
    mode: '0600'

# --- Domain discovery: explicit list OR nginx config scan ---

- name: Use explicit domain list from inventory
  ansible.builtin.set_fact:
    discovered_domains: "{{ certbot_domains | unique | list }}"
  when: certbot_domains | length > 0

- name: Find nginx config files (fallback when certbot_domains is empty)
  ansible.builtin.find:
    paths: "{{ nginx_config_paths }}"
    patterns: "*.conf"
    file_type: file
  register: nginx_config_files
  failed_when: false
  when: certbot_domains | length == 0

- name: Read nginx config files
  ansible.builtin.slurp:
    src: "{{ item.path }}"
  loop: "{{ nginx_config_files.files | default([]) }}"
  register: nginx_config_contents
  when: certbot_domains | length == 0

- name: Extract and filter domains from server_name directives
  ansible.builtin.set_fact:
    discovered_domains: >-
      {{
        nginx_config_contents.results
        | map(attribute='content')
        | map('b64decode')
        | map('regex_findall', '(?m)^\s*(?!#)server_name\s+([^;]+);')
        | flatten
        | map('split')
        | flatten
        | reject('equalto', '_')
        | reject('equalto', 'localhost')
        | reject('match', '^\*\.')
        | reject('match', '^\d+\.\d+\.\d+\.\d+$')
        | reject('equalto', '')
        | unique
        | list
      }}
  when: certbot_domains | length == 0

- name: Show domains to process
  ansible.builtin.debug:
    msg: "Domains for certificate issuance: {{ discovered_domains }}"

# --- Cleanup: remove suffixed and broken certificates ---
# certbot certificates doesn't emit Certificate Name lines for broken/invalid configs,
# so grep-based detection fails. We work directly on the filesystem instead.
# For each configured domain we:
#   1. delete any suffixed renewal configs (domain-0001.conf, domain-0002.conf, ...)
#      and their live/ and archive/ directories
#   2. delete the base renewal config if it exists but certbot no longer considers it
#      valid — this removes the orphan live/<domain>/ dir that causes the next
#      issuance to get a numeric suffix

- name: Clean up suffixed and broken certificates for configured domains
  ansible.builtin.shell: |
    domain="{{ item }}"
    changed=0
    for conf in /etc/letsencrypt/renewal/${domain}-[0-9]*.conf; do
      [ -f "$conf" ] || continue
      cert_name=$(basename "$conf" .conf)
      rm -f "$conf"
      rm -rf "/etc/letsencrypt/live/${cert_name}"
      rm -rf "/etc/letsencrypt/archive/${cert_name}"
      changed=1
    done
    if [ -f "/etc/letsencrypt/renewal/${domain}.conf" ] && \
       ! certbot certificates 2>/dev/null | grep -qE "^[ ]*Certificate Name:[ ]+${domain}$"; then
      rm -f "/etc/letsencrypt/renewal/${domain}.conf"
      rm -rf "/etc/letsencrypt/live/${domain}"
      rm -rf "/etc/letsencrypt/archive/${domain}"
      changed=1
    fi
    echo $changed
  loop: "{{ discovered_domains }}"
  loop_control:
    label: "{{ item }}"
  register: _cleanup_result
  changed_when: _cleanup_result.stdout | trim == '1'

# --- Certificate issuance ---

- name: Get existing certbot certificates
  ansible.builtin.command: certbot certificates
  register: certbot_certificates
  changed_when: false

- name: Parse existing certified domains
  ansible.builtin.set_fact:
    existing_domains: >-
      {{
        certbot_certificates.stdout
        | regex_findall('^[ ]*Domains:[ ]*(.+)$', multiline=True)
        | map('regex_replace', '[ ]+', ' ')
        | map('trim')
        | map('split', ' ')
        | flatten
        | reject('equalto', '')
        | unique
        | list
      }}

- name: Compute domains that need new certificates
  ansible.builtin.set_fact:
    domains_to_issue: "{{ discovered_domains | difference(existing_domains) }}"

- name: Show domains to be issued
  ansible.builtin.debug:
    msg: "Domains to issue certificates for: {{ domains_to_issue }}"

- name: Skip if all domains already have certificates
  ansible.builtin.meta: noop
  when: domains_to_issue | length == 0

- name: Issue certificate via DNS-01 Route53 challenge
  ansible.builtin.command: >
    certbot certonly
    --dns-route53
    {% if certbot_staging %}--staging{% endif %}
    --agree-tos
    --non-interactive
    --email {{ certbot_email }}
    -d {{ item }}
  loop: "{{ domains_to_issue }}"
  register: certbot_issue_result
  changed_when: "'Congratulations' in certbot_issue_result.stdout"
  notify: reload nginx
  environment:
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"

- name: Ensure certbot systemd timer is enabled and running
  ansible.builtin.systemd:
    name: certbot.timer
    enabled: true
    state: started

# --- Fix permissions so nginx can read /etc/letsencrypt ---
# /etc/letsencrypt/live and /etc/letsencrypt/archive are 700 by default.
# We create a shared group, add nginx to it, and install a deploy hook
# so permissions are re-applied automatically on every renewal.

- name: Ensure certbot group exists
  ansible.builtin.group:
    name: certbot
    system: true

- name: Add nginx user to certbot group
  ansible.builtin.user:
    name: "{{ nginx_user }}"
    groups: certbot
    append: true

- name: Create letsencrypt permissions deploy hook
  ansible.builtin.copy:
    dest: /etc/letsencrypt/renewal-hooks/deploy/fix-permissions.sh
    mode: '0755'
    content: |
      #!/bin/bash
      chgrp -R certbot /etc/letsencrypt/live /etc/letsencrypt/archive
      find /etc/letsencrypt/live /etc/letsencrypt/archive -type d -exec chmod g+rX {} \;
      find /etc/letsencrypt/archive -name "*.pem" -exec chmod g+r {} \;

- name: Apply letsencrypt permissions now
  ansible.builtin.command: /etc/letsencrypt/renewal-hooks/deploy/fix-permissions.sh
  changed_when: false
