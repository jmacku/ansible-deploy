---
- name: Ensure UFW is installed
  apt:
    name: ufw
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Set default firewall policies
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: 'incoming', policy: 'deny' }
    - { direction: 'outgoing', policy: 'allow' }
  when: ansible_os_family == "Debian"

- name: Allow SSH traffic
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port | string }}"
    proto: tcp
  notify: Reload UFW
  when: ansible_os_family == "Debian"

- name: Allow additional TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item | string }}"
    proto: tcp
  loop: "{{ expose_tcp_ports }}"
  notify: Reload UFW
  when: ansible_os_family == "Debian"

- name: Allow restricted TCP ports from specific sources
  community.general.ufw:
    rule: allow
    port: "{{ item.0.port | string }}"
    proto: tcp
    from_ip: >-
      {%- if item.1 | regex_search('^[\d.]+$') -%}
        {{ item.1 }}
      {%- else -%}
        {{ lookup('pipe', 'getent hosts ' ~ item.1).split() | first }}
      {%- endif -%}
  loop: "{{ expose_tcp_ports_restricted | subelements('from_ips') }}"
  loop_control:
    label: "port {{ item.0.port }} from {{ item.1 }}"
  notify: Reload UFW
  when:
    - ansible_os_family == "Debian"
    - expose_tcp_ports_restricted | length > 0

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: ansible_os_family == "Debian"