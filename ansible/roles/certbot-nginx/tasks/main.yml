---
- name: Install certbot and nginx plugin
  ansible.builtin.apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present
    update_cache: yes

- name: Find suffixed certificate names for configured domains
  ansible.builtin.shell: >-
    certbot certificates 2>/dev/null |
    grep -E "Certificate Name:[ ]+{{ item }}-[0-9]+" |
    awk '{ print $NF }'
  loop: "{{ certbot_domains }}"
  loop_control:
    label: "{{ item }}"
  register: _suffixed_certs
  changed_when: false

- name: Delete broken base certificates
  ansible.builtin.command: certbot delete --cert-name {{ item.item }} --non-interactive
  loop: "{{ _suffixed_certs.results | selectattr('stdout', 'ne', '') | list }}"
  loop_control:
    label: "{{ item.item }}"
  failed_when: false
  changed_when: true

- name: Delete suffixed certificates (will be re-issued under canonical name)
  ansible.builtin.command: certbot delete --cert-name {{ item.stdout | trim }} --non-interactive
  loop: "{{ _suffixed_certs.results | selectattr('stdout', 'ne', '') | list }}"
  loop_control:
    label: "{{ item.stdout | trim }}"
  changed_when: true

- name: Get existing certbot certificates
  ansible.builtin.command: certbot certificates
  register: certbot_certificates
  changed_when: false

- name: Parse existing certified domains
  ansible.builtin.set_fact:
    existing_domains: >-
      {{
        certbot_certificates.stdout
        | regex_findall('^[ ]*Domains:[ ]*(.+)$', multiline=True)
        | map('regex_replace', '[ ]+', ' ')
        | map('trim')
        | map('split', ' ')
        | flatten
        | reject('equalto', '')
        | unique
        | list
      }}

- name: Compute domains that need new certificates
  ansible.builtin.set_fact:
    domains_to_issue: "{{ certbot_domains | difference(existing_domains) }}"

- name: Issue certificate via HTTP-01 nginx challenge
  ansible.builtin.command: >
    certbot certonly
    --nginx
    {% if certbot_staging %}--staging{% endif %}
    --agree-tos
    --non-interactive
    --email {{ certbot_email }}
    -d {{ item }}
  loop: "{{ domains_to_issue }}"
  register: certbot_issue_result
  changed_when: "'Congratulations' in certbot_issue_result.stdout"
  notify: reload nginx

- name: Ensure certbot systemd timer is enabled and running
  ansible.builtin.systemd:
    name: certbot.timer
    enabled: true
    state: started
