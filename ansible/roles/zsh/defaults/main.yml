zsh_users: []              # List of users to configure, e.g. ['alice', 'bob']
zsh_default_shell: /usr/bin/zsh
zsh_install_ohmyzsh: true  # Whether to install Oh My Zsh
zsh_theme: robbyrussell    # Default theme for Oh My Zsh
zsh_plugins:
  - git
  - zsh-autosuggestions
  - zsh-syntax-highlighting
  - zsh-history-substring-search

zsh_external_plugins:
  zsh-autosuggestions: https://github.com/zsh-users/zsh-autosuggestions.git
  zsh-syntax-highlighting: https://github.com/zsh-users/zsh-syntax-highlighting.git
  zsh-history-substring-search: https://github.com/zsh-users/zsh-history-substring-search.git
