---
- name: Copy all custom Nginx config files to conf.d
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/nginx/conf.d/{{ item | basename }}"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ lookup('fileglob', inventory_dir + '/host_files' + inventory_hostname + '/nginx/conf.d/*.conf', wantlist=True) }}"
  notify: restart nginx
  tags: nginx-config

