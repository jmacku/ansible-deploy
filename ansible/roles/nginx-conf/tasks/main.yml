- name: Template specific Nginx config files to conf.d
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/nginx/conf.d/{{ item | basename | regex_replace('.j2$', '') }}"
    owner: "{{ nginx_user }}"
    group: "{{ nginx_group }}"
    mode: '0644'
  loop: "{{ lookup('fileglob', inventory_dir + '/group_files/' + group_names[0] + '/nginx/conf.d/*.conf.j2', wantlist=True) }}"
  when: group_names[0] is defined
  notify: restart nginx

- name: Ensure Nginx is enabled and running
  ansible.builtin.systemd:
    name: nginx
    enabled: yes
    state: started

- meta: flush_handlers
